name: CI

on:
  push:
    branches: [main, fix-ci]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      libneo_ref:
        default: ''
      full:
        description: run the full suite incl. the golden record (nightly)
        default: 'false'

env:
  LIBNEO_BRANCH: ${{ inputs.libneo_ref }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            gfortran \
            libopenmpi-dev \
            openmpi-bin \
            libhdf5-openmpi-dev \
            libnetcdf-dev \
            libnetcdff-dev \
            libomp-dev \
            libopenblas-dev \
            liblapack-dev \
            doxygen \
            libgsl-dev \
            libsuitesparse-dev \
            libsuperlu-dev \
            python3-dev \
            python3-pip \
            libmpfr-dev \
            libgmp-dev
          pip install numpy scipy matplotlib h5py f90nml pytest

      - name: Cache external dependencies
        uses: actions/cache@v4
        with:
          path: build/external-install
          key: external-deps-${{ runner.os }}-${{ hashFiles('cmake/Fetch*.cmake') }}
          restore-keys: |
            external-deps-${{ runner.os }}-

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # libneo-gate dispatch (no full) runs only the fast tests; push, PR and
          # full=true also run the slow golden record.
          if [ "${{ github.event_name }}" = workflow_dispatch ] && [ "${{ inputs.full }}" != true ]; then
            ctest --test-dir build --output-on-failure -LE golden_record
          else
            ctest --test-dir build --output-on-failure
          fi
