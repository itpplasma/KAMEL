name: CI

on:
  push:
    branches: [main, fix-ci]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

  build-ubuntu:
    name: Build (Ubuntu)
    needs: pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            doxygen \
            gfortran \
            libgmp-dev \
            libgsl-dev \
            libhdf5-openmpi-dev \
            liblapack-dev \
            libmpfr-dev \
            libnetcdf-dev \
            libnetcdff-dev \
            libomp-dev \
            libopenblas-dev \
            libopenmpi-dev \
            libsuitesparse-dev \
            libsuperlu-dev \
            ninja-build \
            openmpi-bin \
            python3-dev \
            python3-pip
          pip install numpy scipy matplotlib h5py f90nml pytest

      - name: Cache external dependencies
        uses: actions/cache@v4
        with:
          path: build/external-install
          key: external-deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('cmake/Fetch*.cmake') }}
          restore-keys: |
            external-deps-${{ runner.os }}-${{ runner.arch }}-

      - name: Build with make
        run: make all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-ubuntu-latest
          path: build
          if-no-files-found: error

  build-macos-arm64:
    name: Build (macOS 14 ARM64)
    needs: pre-commit
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (macOS)
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install \
            cmake \
            ninja \
            gcc \
            llvm \
            lapack \
            openmpi \
            hdf5 \
            netcdf \
            netcdf-fortran \
            libomp \
            openblas \
            gsl \
            suite-sparse \
            superlu \
            mpfr \
            gmp
          pip install numpy scipy matplotlib h5py f90nml pytest

      - name: Cache external dependencies
        uses: actions/cache@v4
        with:
          path: build/external-install
          key: external-deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('cmake/Fetch*.cmake') }}
          restore-keys: |
            external-deps-${{ runner.os }}-${{ runner.arch }}-

      - name: Build with make
        run: make all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-macos-14-arm64
          path: build
          if-no-files-found: error

  test-ubuntu:
    name: Test (Ubuntu)
    needs: build-ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            gfortran \
            libopenmpi-dev \
            openmpi-bin \
            libhdf5-openmpi-dev \
            libnetcdf-dev \
            libnetcdff-dev \
            libomp-dev \
            libopenblas-dev \
            liblapack-dev \
            libgsl-dev \
            libsuitesparse-dev \
            libsuperlu-dev \
            python3-dev \
            python3-pip \
            libmpfr-dev \
            libgmp-dev
          pip install numpy scipy matplotlib h5py f90nml pytest

      - name: Restore build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-ubuntu-latest
          path: .

      - name: Run tests with make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make test

  test-macos-arm64:
    name: Test (macOS 14 ARM64)
    needs: build-macos-arm64
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (macOS)
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install \
            cmake \
            ninja \
            gcc \
            llvm \
            lapack \
            openmpi \
            hdf5 \
            netcdf \
            netcdf-fortran \
            libomp \
            openblas \
            gsl \
            suite-sparse \
            superlu \
            mpfr \
            gmp
          pip install numpy scipy matplotlib h5py f90nml pytest

      - name: Restore build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-macos-14-arm64
          path: .

      - name: Run tests with make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make test
